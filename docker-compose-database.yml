version: '3.8'
services:
  taskmaster-db:
    image: postgres:15
    container_name: taskmaster_postgres
    environment:
      POSTGRES_DB: taskmaster
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - taskmaster_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskmaster-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmaster"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
volumes:
  taskmaster_data:
networks:
  taskmaster-network:
    external: true
