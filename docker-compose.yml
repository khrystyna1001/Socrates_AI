version: '3.8'
services:
  django-backend:
    build: ./src
    working_dir: /app/main
    volumes:
      - ./src/:/app/
    command: uv run python manage.py runserver 0.0.0.0:8000
    ports:
      - 8000:8000
    env_file:
      - .env
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app

  rabbitmq:
    restart: always
    image: rabbitmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"
    expose:
      - "5672"
    environment:
      RABBITMQ_DEFAULT_VHOST: "/"
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"

  celery:
    build: ./src
    working_dir: /app/main
    command: uv run celery -A backend worker -l info
    volumes:
      - ./src/:/app
    depends_on:
      - db
      - rabbitmq

  celery-beat:
    build: ./src
    working_dir: /app/main
    command: uv run celery -A backend beat -l info
    volumes:
      - ./src/:/app
    depends_on:
      - rabbitmq

  db:
    image: ankane/pgvector
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
    - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}


volumes:
  postgres_data: