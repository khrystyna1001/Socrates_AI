version: '3.8'
services:
  taskmaster-api:
    build: .
    container_name: taskmaster_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./sources:/app/sources:ro
    environment:
      - DATABASE_URL=postgresql://taskuser:supersecretpassword@host.docker.internal:5432/taskmaster
      - SECRET_KEY=your-secret-jwt-key-change-in-production
      - ENVIRONMENT=development
      - PDF_PATH=/app/sources
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    networks:
      - taskmaster-network
    restart: unless-stopped

networks:
  taskmaster-network:
    external: true