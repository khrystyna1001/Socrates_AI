version: '3.8'
services:
  taskmaster-api:
    build: .
    container_name: taskmaster_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./sources:/app/sources:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - PDF_PATH=${PDF_PATH}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - taskmaster-network
    restart: unless-stopped

networks:
  taskmaster-network:
    external: true